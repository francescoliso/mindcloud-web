name: Deploy to Production

on:
  push:
    branches: [main]

# Only one deploy runs at a time; a newer push cancels an in-progress one.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://mindcloud.space
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Remote build on Vercel's infrastructure so the full production env
      # (incl. Neon's DATABASE_URL_UNPOOLED) is available to `prisma migrate
      # deploy` in the vercel-build script. Prebuilt/local builds can't see
      # integration-managed env vars.
      - name: Deploy to production
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
