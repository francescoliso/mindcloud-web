name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck, lint, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npx next build
        env:
          # Placeholders only — all DB-backed pages are dynamic, so the build
          # never connects to a database. No real secrets needed for CI.
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          DATABASE_URL_UNPOOLED: postgresql://user:pass@localhost:5432/db
          AUTH_SECRET: ci-placeholder-secret
          ANTHROPIC_API_KEY: placeholder
          ADMIN_EMAIL: ci@mindcloud.space
          APP_URL: https://mindcloud.space
          RESEND_API_KEY: placeholder
